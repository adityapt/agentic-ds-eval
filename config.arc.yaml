project:
  name: "agentic-ds-eval"
  mode: "full-auto"

research:
  topic: "Multi-agent multi-base-model benchmarking of LLM-based AI agents on data-science tasks"
  domains:
    - "machine-learning"
    - "agentic-ai"
    - "data-science"
  daily_paper_count: 10
  quality_threshold: 4.0

runtime:
  timezone: "America/Los_Angeles"
  max_parallel_tasks: 3
  approval_timeout_hours: 12
  retry_limit: 2

notifications:
  channel: "console"
  target: ""
  on_stage_start: true
  on_stage_fail: true
  on_gate_required: true

knowledge_base:
  backend: "markdown"
  root: "docs/kb"

openclaw_bridge:
  use_cron: false
  use_message: false
  use_memory: false
  use_sessions_spawn: false
  use_web_fetch: false
  use_browser: false

llm:
  provider: "anthropic"
  base_url: "https://api.anthropic.com"
  api_key_env: "ANTHROPIC_API_KEY"
  primary_model: "claude-sonnet-4-6"
  fallback_models:
    - "claude-haiku-4-5-20251001"

security:
  hitl_required_stages: [5, 9, 20]
  allow_publish_without_approval: false
  redact_sensitive_logs: true

experiment:
  mode: "simulated"
  time_budget_sec: 300
  max_iterations: 10
  metric_key: "primary_metric"
  metric_direction: "minimize"
  sandbox:
    python_path: ".venv/bin/python3"
    gpu_required: false
    max_memory_mb: 4096
